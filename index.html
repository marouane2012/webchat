<!DOCTYPE html>
<html>
<head>
<title>Webchat</title>
<style>
.box {
    background-color: #f1f900;
    width: 300px;
    height: 300px;
    border: 8px solid black;
    padding: 50px;
    margin: 25px;
    overflow: scroll;
}
body {
    background: linear-gradient(90deg, yellow, lime)
    font-family: "Arial", sans-serif;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h1>Welcome to Webchat!</h1>
Enter room:
<form id="roomform">
<input type="text" id="rcinput" placeholder="Code" maxlength="4" minlength="4" required>
<input type="submit" id="submitrc" value="Enter">
</form>
<h2 id=roomtext>Chat room AAAA</h2>
<div class="box" id="chatbox">
    <p>here</p>
</div>
<input type="text" id="msginput" placeholder="Message" maxlength="2048" required>
<button id="buttom" onclick=sendmsg()>Send message</button>
<script>
    const supabasecl = supabase.createClient('https://fujeqhjyqskjrspvktxc.supabase.co', 'sb_publishable_f7pN-7-I7Qx66e6c0GGy2g_j-YpYLhv')
    const rcinputevents = document.getElementById('rcinput');
    const msginputevents = document.getElementById('msginput');
    const sb = document.getElementById('roomform');
    let room = 'AAAA';
    async function loadmsgs(rcode) {
        const { data, error } = await supabasecl
            .from('msgs')
            .select()
            .eq('room', rcode)
            .order('created_at', {ascending: true});
        if (error) {
            alert('Error');
            return;
        }
        let liveuddata = data.map(msg => `<p>${msg.text}</p>`);
        let formatteddata = liveuddata.join('');
        document.getElementById('chatbox').innerHTML = formatteddata;
    }
    let subscribedto = null
    function stroom(rcode) {
        if (subscribedto) {
            subscribedto.unsubscribe();
        }
        subscribedto = supabasecl
            .channel('roommsgs')
            .on(
                'postgres_changes',
                {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'msgs',
                    filter: `room=eq.${rcode}`
                },
                (payload) => {
                    const newmsg = payload.new;
                    document.getElementById('chatbox').innerHTML += `<p>${newmsg.text}</p>`;
                }
            )
            .subscribe();
    }
    async function sendmsg() {
        const msgtext = msginputevents.value.trim();
        if (!msgtext) return;
        const {error} = await supabasecl
            .from('msgs')
            .insert({text: msgtext, room: room});
        if (error) {
            alert('Error');
            return;
        } else {
            msginputevents.value = '';
        }
    }
    loadmsgs(room);
    stroom(room);
    rcinputevents.addEventListener('input', () => {rcinputevents.value = rcinputevents.value.toUpperCase().replace(/[^A-Z]/g, '');});
    msginputevents.addEventListener('input', () => {msginputevents.value = msginputevents.value.replace(/<(?!br\s*\/?)[^>]+>/gi, '');});
    sb.addEventListener('submit', (event) => {
        if (rcinputevents.value.length != 4) {
            alert('Error');
            return;
        }
        event.preventDefault();
        room = rcinputevents.value;
        loadmsgs(room);
        stroom(room);
        document.getElementById('roomtext').textContent = `Chat room ${room}`;});
</script>
</body>
</html>
